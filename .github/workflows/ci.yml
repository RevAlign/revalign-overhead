name: ci

# Lightweight check: compile, import, and smoke-test the CLI.
# No network, no model download, no API keys.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install the core dependency (Pillow) and pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Pillow>=10.0" pytest

      - name: Byte-compile the package
        run: python -m py_compile birdseye/__init__.py birdseye/__main__.py birdseye/detect.py

      - name: Import the package
        run: python -c "import birdseye; print('birdseye', birdseye.__version__)"

      - name: Smoke-test the CLI (--help, no network)
        run: python -m birdseye --help

      - name: Run the offline test suite
        run: python -m pytest -q
